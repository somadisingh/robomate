name: DataCollector

# XcodeGen project definition.
# After changing this file (or adding new source files), regenerate the
# Xcode project with:  xcodegen generate
# The generated DataCollector.xcodeproj is git-ignored on purpose.

options:
  bundleIdPrefix: com.copilothackathon
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"      # iPhone only
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: A7P8YXSVTV     # baked in so regeneration keeps your signing
    CODE_SIGN_STYLE: Automatic

targets:
  DataCollector:
    type: application
    platform: iOS
    sources:
      - path: DataCollector
    dependencies:
      - package: Supabase
        product: Supabase
      - package: WhisperKit
        product: WhisperKit
    info:
      path: DataCollector/Info.plist
      properties:
        CFBundleDisplayName: Data Collector
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        # --- Permission prompts (shown to the user the first time we access each) ---
        NSCameraUsageDescription: "Used to record the task videos you contribute."
        NSLocationWhenInUseUsageDescription: "Tags your recordings with where they were captured so labs know the location."
        NSMotionUsageDescription: "Records device motion (accelerometer, gyroscope, magnetometer) alongside your video."
        NSMicrophoneUsageDescription: "Records your narration so we can transcribe what you say during the capture."
        NSSpeechRecognitionUsageDescription: "Transcribes your narration on-device into a timestamped transcript saved with the recording."
        # --- Dev convenience: expose the app's Documents folder in the Files app ---
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        # --- Camera app: lock to portrait ---
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
