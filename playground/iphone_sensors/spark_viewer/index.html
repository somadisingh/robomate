<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iPhone Data 3 Spark Viewer</title>
  </head>
  <body>
    <main id="app">
      <div id="viewport"></div>
      <section id="hud" aria-live="polite">
        <strong id="dataset-name">iphone-data-3.spz</strong>
        <span id="status">loading</span>
        <button id="track-camera" type="button">Play Capture</button>
        <button id="start-view" type="button">Start View</button>
        <button id="overview" type="button">Overview</button>
        <span id="playback-time">0.0s / 0.0s</span>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
